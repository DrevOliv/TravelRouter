<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pi Travel Router</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand-block">
        <h1>Pi Travel Router</h1>
        <span class="mode-badge" data-demo-badge hidden>Demo mode</span>
      </div>
      <div class="nav-scroll nav-desktop">
        <nav>
          <a href="/" data-nav-link>Home</a>
          <a href="/backup" data-nav-link>Files</a>
          <a href="/media" data-nav-link>Media</a>
          <a href="/remote" data-nav-link>Remote</a>
          <a href="/settings" data-nav-link>Settings</a>
        </nav>
      </div>
      <form action="/api/auth/logout" method="post" data-api-form class="header-logout">
        <button type="submit" data-action="auth_logout" class="secondary">Log out</button>
      </form>
    </header>
    <main class="layout">
      <div id="app-root">
        <section class="card loading-card">
          <p class="muted">Loading…</p>
        </section>
      </div>
    </main>
    <div class="toast-stack" data-toast-stack aria-live="polite" aria-atomic="true"></div>
    <nav class="mobile-tabbar">
      <a href="/" data-nav-link>Home</a>
      <a href="/backup" data-nav-link>Files</a>
      <a href="/media" data-nav-link>Media</a>
      <a href="/remote" data-nav-link>Remote</a>
      <a href="/settings" data-nav-link>Settings</a>
    </nav>
  </body>
</html>
