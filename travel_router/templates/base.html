<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pi Travel Router</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="brand-block">
        <h1>Pi Travel Router</h1>
      </div>
      <div class="nav-scroll nav-desktop">
        <nav>
          <a href="{{ url_for('router.index') }}">Home</a>
          <a href="{{ url_for('router.media') }}">Media</a>
          <a href="{{ url_for('router.remote') }}">Remote</a>
          <a href="{{ url_for('router.settings_page') }}">Settings</a>
        </nav>
      </div>
    </header>
    <main class="layout">
      {% if ui_feedback %}
        <section class="feedback-banner {{ 'success' if ui_feedback.ok else 'error' }}" data-feedback>
          <div>
            <strong>{{ ui_feedback.message }}</strong>
            {% if ui_feedback.detail %}
              <p>{{ ui_feedback.detail }}</p>
            {% endif %}
            {% if ui_feedback.link %}
              <p><a href="{{ ui_feedback.link }}" target="_blank" rel="noopener noreferrer">Open link</a></p>
            {% endif %}
          </div>
        </section>
      {% else %}
        <section class="feedback-banner" data-feedback hidden></section>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <nav class="mobile-tabbar">
      <a href="{{ url_for('router.index') }}">Home</a>
      <a href="{{ url_for('router.media') }}">Media</a>
      <a href="{{ url_for('router.remote') }}">Remote</a>
      <a href="{{ url_for('router.settings_page') }}">Settings</a>
    </nav>
  </body>
</html>
